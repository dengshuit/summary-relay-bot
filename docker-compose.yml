services:
  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: summary_relay_bot
      POSTGRES_USER: summary_bot
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summary_bot -d summary_relay_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
