services:
  bot:
    image: ${BOT_IMAGE:-summary-relay-bot:local}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-summary_relay_bot}
      POSTGRES_USER: ${POSTGRES_USER:-summary_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-summary_bot} -d $${POSTGRES_DB:-summary_relay_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
