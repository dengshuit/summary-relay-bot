services:
  bot:
    image: ${BOT_IMAGE:-ghcr.io/dengshuit/summary-relay-bot:latest}
    command: ["sh", "-c", "alembic upgrade head && exec summary-relay-bot"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEBUI_PORT:-8080}:${WEBUI_PORT:-8080}"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-summary_relay_bot}
      POSTGRES_USER: ${POSTGRES_USER:-summary_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-summary_bot} -d $${POSTGRES_DB:-summary_relay_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
